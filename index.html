<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMERS | Envíos colaborativos</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

body { font-family: 'Inter'; background:#020617; color:white; }

.bg-main { background: radial-gradient(circle at top, #1e293b 0%, #020617 100%); min-height:100vh; }

.logo { width:90px;height:90px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:30%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(59,130,246,.4); }

.glass { background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(10px); }

.btn { background:linear-gradient(90deg,#3b82f6,#2563eb); }

.hidden { display:none!important; }
</style>
</head>

<body class="bg-main">

<!-- LOADER -->
<div id="loader" class="fixed inset-0 flex items-center justify-center bg-black z-50">
<div class="logo"><i class="fa-solid fa-box text-xl"></i></div>
</div>

<!-- LOGIN -->
<div id="login" class="hidden flex flex-col items-center p-8 text-center min-h-screen">

<div class="logo mt-10 mb-6"><i class="fa-solid fa-box"></i></div>

<h1 class="text-5xl font-black text-blue-500 italic">LUMERS</h1>
<p class="text-xs uppercase tracking-widest text-blue-400 mt-2">
Envíos con subasta y pago protegido
</p>

<div class="glass p-6 rounded-3xl mt-10 max-w-sm space-y-4 text-left">

<div>
<b class="text-blue-400 text-xs">Subasta en tiempo real</b>
<p class="text-xs opacity-60">Recibí ofertas de transportistas y elegí la mejor.</p>
</div>

<div>
<b class="text-blue-400 text-xs">Pago protegido</b>
<p class="text-xs opacity-60">El dinero se libera al confirmar entrega.</p>
</div>

<div>
<b class="text-blue-400 text-xs">Comunidad confiable</b>
<p class="text-xs opacity-60">Usuarios con reputación visible.</p>
</div>

</div>

<button id="btnLogin" class="btn mt-10 px-8 py-4 rounded-xl font-bold text-xs uppercase">
Entrar con Google
</button>

<footer class="mt-auto text-xs opacity-40 mt-10 space-y-2">
<div class="flex gap-3 justify-center">
<span onclick="verLegal('terminos')" class="cursor-pointer">Términos</span>
<span onclick="verLegal('privacidad')" class="cursor-pointer">Privacidad</span>
<span onclick="verLegal('aviso')" class="cursor-pointer">Aviso</span>
</div>
</footer>

</div>

<!-- APP -->
<div id="app" class="hidden min-h-screen flex flex-col">

<header class="p-4 glass flex justify-between">
<h1 class="font-black text-blue-500">LUMERS</h1>
<button onclick="logout()">Salir</button>
</header>

<main class="p-4 space-y-4 pb-20">

<div class="glass p-4 rounded-xl">
<p class="text-xs mb-2">Raider Pro (USD 5)</p>
<button onclick="verPase()" class="btn w-full py-3 rounded-xl text-xs">Suscribirme</button>
</div>

<div id="lista"></div>

</main>

<button onclick="toggleModal(true)" class="fixed bottom-6 right-6 btn w-14 h-14 rounded-full">
+
</button>

</div>

<!-- MODAL NUEVO ENVIO -->
<div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-6">

<div class="glass p-6 rounded-2xl w-full max-w-sm space-y-3">

<input id="ori" placeholder="Origen" class="w-full p-3 bg-black/40 rounded">
<input id="des" placeholder="Destino" class="w-full p-3 bg-black/40 rounded">
<input id="pre" placeholder="Precio" class="w-full p-3 bg-black/40 rounded">
<input id="tel" placeholder="WhatsApp" class="w-full p-3 bg-black/40 rounded">

<button onclick="crear()" class="btn w-full py-3 rounded">Publicar</button>
<button onclick="toggleModal(false)">Cancelar</button>

</div>
</div>

<!-- MODAL LEGAL -->
<div id="legal" class="hidden fixed inset-0 bg-black/90 p-6 overflow-y-auto">

<div class="glass p-6 rounded-xl max-w-2xl mx-auto text-xs space-y-4">
<h2 id="legalTitle" class="text-blue-400 text-lg font-bold"></h2>
<div id="legalText"></div>
<button onclick="cerrarLegal()" class="btn w-full py-3">Cerrar</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey: "TU_API",
authDomain: "TU_AUTH",
projectId: "TU_ID"
});

const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

onAuthStateChanged(auth, (user)=>{
document.getElementById("loader").style.display="none";
if(user){
login.classList.add("hidden");
appDiv.classList.remove("hidden");
cargar();
}else{
login.classList.remove("hidden");
appDiv.classList.add("hidden");
}
});

btnLogin.onclick=()=>signInWithPopup(auth,provider);
window.logout=()=>signOut(auth);

window.toggleModal=(v)=>modal.classList.toggle("hidden",!v);

window.crear=async()=>{
await addDoc(collection(db,"viajes"),{
origen:ori.value,
destino:des.value,
precio:pre.value
});
toggleModal(false);
};

function cargar(){
onSnapshot(collection(db,"viajes"),snap=>{
lista.innerHTML="";
snap.forEach(doc=>{
const d=doc.data();
lista.innerHTML+=`<div class="glass p-4 rounded">
<b>${d.origen}</b> → ${d.destino}
<p>$${d.precio}</p>
</div>`;
});
});
}

window.verPase=()=>{
window.location.href="https://link.mercadopago.com.ar/lumersraiderpro";
};

const textos={
terminos:`LUMERS es plataforma de intermediación...`,
privacidad:`Se recopilan datos básicos...`,
aviso:`LUMERS no realiza transporte...`
};

window.verLegal=(t)=>{
legal.classList.remove("hidden");
legalTitle.innerText=t;
legalText.innerHTML=textos[t];
};

window.cerrarLegal=()=>legal.classList.add("hidden");
</script>

</body>
</html>
