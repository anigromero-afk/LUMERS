<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMERS®</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0b0f1a;
--card:#121826;
--accent:#3b82f6;
--green:#22c55e;
--text:#e5e7eb;
--sub:#94a3b8;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
font-weight:800;
letter-spacing:-1px;
}

.card{
background:var(--card);
border-radius:20px;
padding:20px;
margin-bottom:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.btn{
width:100%;
padding:16px;
border-radius:14px;
border:none;
font-weight:700;
cursor:pointer;
}

.btn-primary{
background:var(--accent);
color:white;
}

.btn-success{
background:var(--green);
color:white;
}

.secure{
background:rgba(34,197,94,0.1);
border:1px solid rgba(34,197,94,0.3);
padding:12px;
border-radius:12px;
font-size:0.8rem;
margin-bottom:15px;
}

.steps{
display:flex;
justify-content:space-between;
font-size:0.65rem;
text-align:center;
margin-bottom:15px;
}

.step{
width:30%;
background:#1f2937;
padding:10px;
border-radius:10px;
}

input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:10px;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
}

.wallet{
background:linear-gradient(135deg,#1e293b,#020617);
padding:20px;
border-radius:20px;
margin-bottom:15px;
}

.price{
font-size:1.6rem;
font-weight:800;
color:var(--green);
}

.small{
font-size:0.75rem;
color:var(--sub);
}

.view{display:none;}
.active{display:block;}

</style>
</head>

<body>

<div class="container">

<h1>⚡ LUMERS®</h1>

<!-- HOME -->
<div id="home" class="view active">

<div class="secure">
🛡️ Dinero protegido hasta confirmar entrega
</div>

<div class="steps">
<div class="step">📦 Publicás</div>
<div class="step">🚚 Compiten</div>
<div class="step">💰 Pagás seguro</div>
</div>

<div class="card" onclick="goClient()">
<b>👤 Soy Cliente</b><br>
<span class="small">Enviar paquete</span>
</div>

<div class="card" onclick="goRaider()">
<b>🏍️ Soy Raider</b><br>
<span class="small">Ganar dinero</span>
</div>

</div>

<!-- CLIENT -->
<div id="client" class="view">

<div class="secure">💰 Si no recibís → NO pagás</div>

<div class="card">
<input placeholder="Qué enviás">
<input placeholder="Origen → destino">
<input placeholder="Tu presupuesto">

<button class="btn btn-primary" onclick="send()">Iniciar subasta</button>

<div class="small" style="margin-top:10px;">
⏳ Raiders ofertando ahora...
</div>
</div>

</div>

<!-- RAIDER -->
<div id="raider" class="view">

<div class="wallet">
<div class="small">Ganancias hoy</div>
<div style="font-size:2rem;font-weight:800;">$18.000</div>
</div>

<div class="card">
<b>📦 Pedido activo</b><br>
<span class="small">Centro → Somisa</span>

<div class="price">$4.500</div>

<input placeholder="Tu oferta">

<button class="btn btn-success" onclick="offer()">Ofertar</button>
</div>

</div>

</div>

<script>

const tel="3364652349";

function goClient(){
toggle("home","client");
}

function goRaider(){
toggle("home","raider");
}

function toggle(hide,show){
document.getElementById(hide).classList.remove("active");
document.getElementById(show).classList.add("active");
}

function send(){
window.location.href=`https://wa.me/${tel}?text=Pedido LUMERS`;
}

function offer(){
window.location.href=`https://wa.me/${tel}?text=Oferta LUMERS`;
}

</script>

</body>
</html>
