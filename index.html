<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>LUMERS® | Logística Inteligente</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      margin:0;
      min-height:100vh;
      background:#020617;
      color:white;
      font-family:Arial, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    .bg{
      position:fixed;
      inset:0;
      background:
      radial-gradient(circle at top, rgba(59,130,246,0.35), transparent 40%),
      radial-gradient(circle at bottom, rgba(249,115,22,0.2), transparent 30%),
      #020617;
      z-index:-1;
    }

    .card{
      width:90%;
      max-width:420px;
      background:rgba(15,23,42,0.7);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px;
      padding:40px 30px;
      text-align:center;
      backdrop-filter:blur(20px);
      box-shadow:0 0 40px rgba(0,0,0,0.4);
    }

    .logo{
      font-size:52px;
      font-weight:900;
      letter-spacing:4px;
      margin-bottom:10px;
    }

    .sub{
      color:#94a3b8;
      font-size:14px;
      margin-bottom:35px;
    }

    .btn{
      display:inline-block;
      width:100%;
      padding:16px;
      border-radius:18px;
      background:linear-gradient(135deg,#f97316,#ea580c);
      color:white;
      text-decoration:none;
      font-weight:700;
      transition:0.2s;
      box-sizing:border-box;
    }

    .btn:hover{
      transform:scale(1.02);
    }

    .status{
      margin-top:25px;
      font-size:13px;
      color:#22c55e;
    }

    .footer{
      margin-top:30px;
      font-size:11px;
      color:#64748b;
    }
  </style>
</head>

<body>

<div class="bg"></div>

<div class="card">

  <div class="logo">
    LUMERS®
  </div>

  <div class="sub">
    Plataforma de logística y subastas inteligentes
  </div>

  <a href="#" class="btn">
    INGRESAR
  </a>

  <div class="status">
    ● Sitio online correctamente
  </div>

  <div class="footer">
    San Nicolás de los Arroyos · Argentina
  </div>

</div>

</body>
</html>
