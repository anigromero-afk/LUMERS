<div style="background: #1e293b; padding: 25px; border-radius: 28px; text-align: center; color: white; margin-top: 30px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
    <div style="font-size: 2rem; margin-bottom: 10px;">👤</div>
    <h3 style="margin: 0; font-weight: 800; letter-spacing: -0.5px;">Registro Seguro LUMERS</h3>
    <p style="font-size: 0.85rem; color: #94a3b8; margin: 10px 0 20px;">
        Para garantizar la seguridad de los envíos, el registro requiere **validación de identidad biométrica**.
    </p>
    
    <button onclick="registrarLumer()" style="width: 100%; background: linear-gradient(90deg, #3b82f6, #2563eb); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
        <span>🔍</span> INICIAR ESCANEO BIOMÉTRICO
    </button>
</div>

<script>
    // --- NUEVAS FUNCIONES DE REGISTRO ---

    function registrarLumer() {
        // Efecto visual de inicio de proceso
        alert("Iniciando sistema de validación facial y DNI de LUMERS...");
        
        // El mensaje de WhatsApp ahora incluye la solicitud de datos biométricos
        const mensajeBiometrico = encodeURIComponent(
            "¡Hola Aníbal! Quiero registrarme en LUMERS.\n\n" +
            "Estoy listo para enviar mis datos biométricos:\n" +
            "1. Foto de DNI (Frente y Dorso)\n" +
            "2. Selfie de validación facial\n" +
            "3. Documentación del vehículo"
        );
        
        window.location.href = `https://wa.me/3364652349?text=${mensajeBiometrico}`;
    }

    // --- ACTUALIZACIÓN DE LA FUNCIÓN DE OFERTA ---
    function submitBid() {
        const bidValue = document.getElementById("bidInput").value;
        const currentPrice = 15000; 

        if(bidValue >= currentPrice || bidValue <= 0) {
            alert("Tu oferta debe ser menor al precio actual para competir.");
            return;
        }

        // Mensaje de WhatsApp corregido con "Lumers"
        const msg = encodeURIComponent(
            `¡Hola Aníbal! Soy un Lumer y quiero ganar este remate en LUMERS.\n` +
            `Mi oferta final para este envío es: $${bidValue}`
        );
        window.location.href = `https://wa.me/3364652349?text=${msg}`;
    }
</script>
